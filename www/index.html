<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a12">
<title>Captora</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{--bg:#0a0a12;--c1:#13131f;--c2:#1c1c2e;--c3:#25253a;--a:#7c3aed;--v:#8b5cf6;--p:#ec4899;--g:#10b981;--r:#ef4444;--go:#f59e0b;--tx:#f1f1ff;--t2:#6b6b9a;--t3:#30304a;--rd:12px}
body[data-theme=light]{--bg:#f4f4f8;--c1:#fff;--c2:#ebebf2;--c3:#dcdce8;--tx:#0c0c1e;--t2:#5050a0;--t3:#a0a0c0}
body[data-theme=amoled]{--bg:#000;--c1:#0d0d0d;--c2:#161616;--c3:#202020;--tx:#fff;--t2:#777;--t3:#333}
body[data-theme=ocean]{--bg:#010d1a;--c1:#041828;--c2:#062338;--c3:#083050;--a:#0284c7;--v:#38bdf8;--tx:#e0f2fe;--t2:#4a9cc4;--t3:#1a4060}
body[data-theme=rose]{--bg:#0e0209;--c1:#180412;--c2:#22061c;--c3:#2e0826;--a:#be185d;--v:#f472b6;--tx:#fce7f3;--t2:#c47099;--t3:#500e30}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{height:100dvh;display:flex;flex-direction:column;will-change:auto}

/* SPLASH */
#spl{position:fixed;inset:0;z-index:99;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:opacity .5s ease}
#spl.out{opacity:0;pointer-events:none}
.spl-logo{width:76px;height:76px;border-radius:22px;background:linear-gradient(135deg,var(--a),var(--p));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 32px rgba(124,58,237,.4)}
.spl-name{font-size:28px;font-weight:900;letter-spacing:-.5px}
.spl-tag{font-size:11px;color:var(--t2);letter-spacing:.5px}

/* TOPBAR */
.top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--c1);border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-ic{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--a),var(--p));display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-nm{font-size:18px;font-weight:900;letter-spacing:-.3px}
.top-btns{display:flex;gap:6px}
.btn-sm{padding:6px 12px;border-radius:20px;border:none;font-size:11px;font-weight:800;cursor:pointer;transition:opacity .15s}
.btn-sm:active{opacity:.7}
.btn-gold{background:linear-gradient(135deg,var(--go),#f97316);color:#000}
.btn-pur{background:linear-gradient(135deg,var(--a),var(--v));color:#fff}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;overscroll-behavior:contain}
.page.on{display:block}
.page::-webkit-scrollbar{display:none}

/* VIDEO SECTION */
.vsec{background:#000;height:36svh;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#vid{width:100%;height:100%;object-fit:contain;display:none}
.vempty{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.vempty-ic{width:60px;height:60px;border-radius:18px;border:2px dashed rgba(124,58,237,.35);display:flex;align-items:center;justify-content:center;font-size:26px}
.vempty-tx{font-size:12px;color:var(--t2)}
.cap-wrap{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);width:88%;text-align:center;pointer-events:none}
#cdsp{display:inline-block;padding:5px 13px;border-radius:7px;font-size:18px;font-weight:700;line-height:1.4;word-break:break-word;max-width:100%;transition:opacity .2s}

/* VIDEO CONTROLS */
.vctl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.96));padding:5px 14px 11px;display:none;flex-direction:column;gap:7px}
.vctl.on{display:flex}
.seek-row{display:flex;align-items:center;gap:9px}
.seek{flex:1;height:20px;display:flex;align-items:center;position:relative;cursor:pointer;touch-action:none}
.seek-bg{position:absolute;inset-inline:0;height:4px;background:rgba(255,255,255,.15);border-radius:4px}
.seek-fill{position:absolute;left:0;height:4px;background:linear-gradient(90deg,var(--v),var(--p));border-radius:4px;width:0;transition:width .08s linear}
.seek-dot{position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:50%;margin-top:-8px;transform:translateX(-50%);left:0;box-shadow:0 2px 10px rgba(0,0,0,.6);transition:left .08s linear}
.time{font-size:10px;font-family:monospace;color:rgba(255,255,255,.55);white-space:nowrap;letter-spacing:.2px}
.vbts{display:flex;align-items:center;justify-content:space-around;padding:0 6px}
.vbtn{background:rgba(255,255,255,.07);border:none;color:#fff;cursor:pointer;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:background .12s,transform .1s;-webkit-tap-highlight-color:transparent}
.vbtn:active{background:rgba(255,255,255,.2);transform:scale(.88)}
.vbtn.play{width:54px;height:54px;font-size:22px;background:linear-gradient(135deg,var(--a),var(--p));border-radius:50%;flex-direction:row;box-shadow:0 4px 18px rgba(124,58,237,.45)}
.vbtn.play:active{transform:scale(.9)}
.vbtn.skip{width:42px;height:42px;font-size:14px;font-weight:800}
.vbtn.ic{width:36px;height:36px;font-size:17px}
.sk-lb{font-size:7px;font-weight:900;opacity:.7;line-height:1}
.spdbtn{padding:5px 11px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:16px;color:rgba(255,255,255,.88);font-size:11px;font-weight:800;cursor:pointer;font-family:monospace;letter-spacing:.4px;transition:background .12s;-webkit-tap-highlight-color:transparent}
.spdbtn:active{background:rgba(255,255,255,.2)}

/* PANELS */
.pnls{padding:10px;display:flex;flex-direction:column;gap:8px}
.pnl{background:var(--c1);border-radius:var(--rd);border:1px solid rgba(255,255,255,.045);padding:12px}
.pnl-hd{font-size:9px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px}
.row{display:flex;gap:6px;align-items:center}
.inp{flex:1;background:var(--c2);border:1.5px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;color:var(--tx);font-size:13px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--v)}
.inp::placeholder{color:var(--t3)}
.add-btn{width:40px;height:40px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--a),var(--v));color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.add-btn:active{opacity:.75}

/* STYLE GRID */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.scard{background:var(--c2);border:1.5px solid rgba(255,255,255,.055);border-radius:10px;padding:6px 4px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s}
.scard.on{border-color:var(--v);background:rgba(124,58,237,.1)}
.scard:active{opacity:.75}
.sp{font-size:9px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:3px;margin-bottom:3px;padding:0 4px}
.sn{font-size:8px;color:var(--t2)}
.more-link{font-size:10px;color:var(--v);font-weight:800;cursor:pointer}

/* SLIDERS */
.slrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sllb{font-size:10px;color:var(--t2);width:58px;flex-shrink:0}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:4px;background:var(--c3);outline:none;accent-color:var(--v)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--v);border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.slval{font-size:10px;color:var(--v);font-family:monospace;width:28px;text-align:right}

/* COLORS */
.cols{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.col{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.col.on{border-color:#fff;transform:scale(1.18)}

/* CAPTION LIST */
.clist{display:flex;flex-direction:column;gap:4px}
.citem{display:flex;align-items:center;gap:7px;background:var(--c2);border-radius:9px;padding:8px 10px}
.ctm{font-size:9px;color:var(--v);font-family:monospace;width:34px;flex-shrink:0;font-weight:800}
.ctx{flex:1;font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:2px;transition:color .15s}
.cdel:active{color:var(--r)}
.cempty{text-align:center;color:var(--t3);font-size:11px;padding:16px 0;line-height:2}

/* STYLES PAGE */
.spage{padding:10px}
.sinp{width:100%;background:var(--c1);border:1.5px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;color:var(--tx);font-size:13px;outline:none;margin-bottom:10px;-webkit-appearance:none}
.scats{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px}
.scats::-webkit-scrollbar{display:none}
.scat{padding:5px 11px;border-radius:16px;font-size:11px;font-weight:700;background:var(--c2);border:1px solid rgba(255,255,255,.055);cursor:pointer;color:var(--t2);white-space:nowrap;flex-shrink:0;transition:background .15s,color .15s}
.scat.on{background:var(--v);color:#fff;border-color:var(--v)}
.sgrid2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.scard2{background:var(--c1);border:1.5px solid rgba(255,255,255,.045);border-radius:var(--rd);padding:10px;cursor:pointer;transition:border-color .15s}
.scard2.on{border-color:var(--v)}
.scard2:active{opacity:.75}
.sp2{font-size:11px;min-height:26px;display:flex;align-items:center;border-radius:3px;padding:3px 6px;margin-bottom:4px}
.sn2{font-size:9px;color:var(--t2)}
.cat-hd{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin:10px 0 6px}

/* PREMIUM */
.prm{padding:12px;display:flex;flex-direction:column;gap:9px}
.plan{background:var(--c1);border:2px solid rgba(255,255,255,.07);border-radius:16px;padding:16px;cursor:pointer;transition:border-color .15s}
.plan:active{opacity:.85}
.plan-row{display:flex;align-items:center;justify-content:space-between}
.plan-name{font-size:16px;font-weight:800}
.plan-sub{font-size:11px;color:var(--t2);margin-top:2px}
.plan-old{font-size:9px;color:var(--t3);text-decoration:line-through}
.plan-price{font-size:28px;font-weight:900}
.plan-unit{font-size:9px;color:var(--t3)}
.badge-best{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,var(--go),#f97316);color:#000;font-size:9px;font-weight:900;padding:3px 12px;border-radius:18px;white-space:nowrap}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.feat-it{font-size:11px;color:var(--t2);display:flex;gap:5px;align-items:center}
.feat-ic{color:var(--g);font-size:10px}
.pay-btn{width:100%;padding:14px;border-radius:12px;border:none;font-weight:900;font-size:15px;cursor:pointer;transition:opacity .15s}
.pay-btn:active{opacity:.8}

/* SETTINGS */
.setp{padding:12px;display:flex;flex-direction:column;gap:8px}
.sec{background:var(--c1);border-radius:var(--rd);border:1px solid rgba(255,255,255,.045);overflow:hidden}
.sec-hd{padding:10px 13px 4px;font-size:9px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.9px}
.sec-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border-top:1px solid rgba(255,255,255,.035)}
.sec-ic{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.sec-tx{flex:1;font-size:12px;font-weight:500}
.tog{position:relative;width:42px;height:24px;cursor:pointer;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-bg{position:absolute;inset:0;background:var(--c3);border-radius:24px;transition:background .2s}
.tog input:checked+.tog-bg{background:var(--v)}
.tog-dot{position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog input:checked~.tog-dot{transform:translateX(18px)}
.theme-row{display:flex;gap:9px;padding:10px 13px 12px;border-top:1px solid rgba(255,255,255,.035);overflow-x:auto}
.theme-row::-webkit-scrollbar{display:none}
.th-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.th-dot{width:40px;height:40px;border-radius:12px;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s}
.th-dot.on{border-color:#fff;transform:scale(1.08)}
.th-dot:active{transform:scale(.95)}
.th-lb{font-size:8px;color:var(--t2);font-weight:700}

/* PROFILE */
.pfp{padding:12px;display:flex;flex-direction:column;gap:8px}
.pf-card{background:var(--c1);border:1px solid rgba(255,255,255,.045);border-radius:20px;padding:20px;text-align:center}
.pf-av{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;background:linear-gradient(135deg,var(--a),var(--p));display:flex;align-items:center;justify-content:center;font-size:28px}
.pf-name{font-size:17px;font-weight:800}
.pf-sub{font-size:10px;color:var(--t2);margin-top:3px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.stat{background:var(--c1);border:1px solid rgba(255,255,255,.045);border-radius:var(--rd);padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:900;color:var(--v)}
.stat-l{font-size:8px;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.menu{background:var(--c1);border:1px solid rgba(255,255,255,.045);border-radius:var(--rd);overflow:hidden}
.menu-it{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.035);cursor:pointer;transition:background .12s}
.menu-it:last-child{border-bottom:none}
.menu-it:active{background:var(--c2)}
.menu-ic{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.menu-tx{flex:1;font-size:12px;font-weight:600}
.menu-ar{color:var(--t3);font-size:14px}

/* NAVBAR */
.nav{display:flex;background:var(--c1);border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0;background:none;border:none;cursor:pointer;gap:2px;position:relative;-webkit-tap-highlight-color:transparent}
.nb::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2.5px;background:var(--v);border-radius:0 0 3px 3px;transition:width .2s}
.nb.on::after{width:24px}
.nb-ic{font-size:19px;line-height:1}
.nb-lb{font-size:8px;color:var(--t3);font-weight:700;transition:color .15s}
.nb.on .nb-lb{color:var(--v)}
.nb.ctr .nb-ic{width:46px;height:46px;border-radius:13px;font-size:20px;background:linear-gradient(135deg,var(--a),var(--p));display:flex;align-items:center;justify-content:center;margin-top:-6px;box-shadow:0 4px 14px rgba(124,58,237,.35)}

/* TOAST */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(18,18,28,.96);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:8px 16px;font-size:11px;font-weight:600;z-index:999;white-space:nowrap;max-width:88vw;transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .22s;opacity:0;pointer-events:none;backdrop-filter:blur(10px)}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* RENDER OVERLAY */
.rend{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:90;flex-direction:column;align-items:center;justify-content:center;gap:14px;display:none}
.rend.on{display:flex}
.rring{width:62px;height:62px;border-radius:50%;border:3px solid rgba(255,255,255,.06);border-top-color:var(--v);animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rpct{font-size:38px;font-weight:900;color:var(--v);font-family:monospace}
.rbar{width:200px;height:5px;background:var(--c3);border-radius:5px;overflow:hidden}
.rbarf{height:100%;background:linear-gradient(90deg,var(--a),var(--p));width:0;border-radius:5px;transition:width .15s}
.rcan{padding:8px 20px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:20px;color:var(--r);font-size:11px;font-weight:800;cursor:pointer;border:none}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.modal.on{display:flex}
.modal-box{width:100%;background:var(--c1);border-radius:20px 20px 0 0;padding:16px 16px env(safe-area-inset-bottom,20px);max-height:78vh;overflow-y:auto}
.modal-box::-webkit-scrollbar{display:none}
.modal-bar{width:34px;height:3px;background:var(--c3);border-radius:3px;margin:0 auto 14px}
.modal-title{font-size:17px;font-weight:900;margin-bottom:12px}
.mbtn{width:100%;padding:13px;border-radius:11px;border:none;font-weight:800;font-size:13px;cursor:pointer;margin-bottom:7px;display:block;text-align:center;transition:opacity .15s}
.mbtn:active{opacity:.75}
.mbtn:last-child{margin-bottom:0}
.minfo{background:var(--c2);border-radius:10px;padding:11px 13px;font-size:11px;color:var(--t2);line-height:1.9;margin-bottom:10px}

/* AD BAR */
.adbar{display:flex;align-items:center;gap:7px;margin:0 10px 7px;padding:8px 11px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.14);border-radius:10px;flex-shrink:0}
.ad-lbl{font-size:8px;color:var(--t2);background:var(--c3);padding:2px 5px;border-radius:3px;font-weight:800;flex-shrink:0}
.ad-tx{flex:1;font-size:10px;color:var(--t2)}
.ad-cta{font-size:10px;color:var(--v);font-weight:900;cursor:pointer;white-space:nowrap}
.ad-x{cursor:pointer;color:var(--t3);font-size:13px;padding:3px}
</style>
</head>
<body>
<div id="spl"><div class="spl-logo">✨</div><div class="spl-name">Captora</div><div class="spl-tag">Caption Maker Pro</div></div>
<div class="toast" id="tst"></div>
<div class="rend" id="rend"><div class="rring"></div><div class="rpct" id="rpct">0%</div><div class="rbar"><div class="rbarf" id="rbarf"></div></div><div style="font-size:11px;color:var(--t2)">Rendering...</div><button class="rcan" onclick="cancelRender()">Cancel</button></div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal-box"><div class="modal-bar"></div><div id="mbody"></div></div></div>

<div id="app">
  <div class="top">
    <div class="logo"><div class="logo-ic">✨</div><span class="logo-nm">Captora</span></div>
    <div class="top-btns">
      <button class="btn-sm btn-gold" onclick="nav('premium')">👑 Premium</button>
      <button class="btn-sm btn-pur" onclick="doExport()">💾 Save</button>
    </div>
  </div>

  <div class="pages">
    <!-- EDITOR PAGE -->
    <div class="page on" id="pg-editor">
      <div class="vsec" id="vsec" onclick="pickVideo()">
        <video id="vid" playsinline preload="metadata"></video>
        <div class="vempty" id="vempty"><div class="vempty-ic">🎬</div><div class="vempty-tx">Video Import Karo</div></div>
        <div class="cap-wrap"><div id="cdsp"></div></div>
        <div class="vctl" id="vctl">
          <div class="seek-row">
            <div class="seek" id="seek"><div class="seek-bg"></div><div class="seek-fill" id="sf"></div><div class="seek-dot" id="sd"></div></div>
            <span class="time" id="ttime">0:00/0:00</span>
          </div>
          <div class="vbts">
            <button class="vbtn ic" id="mute-btn" onclick="toggleMute()">🔊</button>
            <button class="vbtn skip" onclick="skip(-10)">⏪<span class="sk-lb">10s</span></button>
            <button class="vbtn play" id="play-btn" onclick="togglePlay()">▶</button>
            <button class="vbtn skip" onclick="skip(10)">⏩<span class="sk-lb">10s</span></button>
            <button class="spdbtn" id="spdbtn" onclick="cycleSpeed()">1×</button>
